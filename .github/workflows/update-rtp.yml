name: Update RTP Sources

on:
  workflow_dispatch:
  schedule:
    # 每天执行 2 次（UTC 00:00、12:00）
    - cron: "0 0,12 * * *"

concurrency:
  group: update-rtp-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Debug workspace
        run: |
          pwd
          ls -la
          ls -la "${{ github.workspace }}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "${{ github.workspace }}/requirements.txt" ]; then
            pip install -r "${{ github.workspace }}/requirements.txt"
          else
            echo "requirements.txt not found, fallback to direct install."
            pip install "requests>=2.31.0"
          fi

      - name: Run updater
        run: python rtp/b.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Rebase onto latest remote safely (generated files may exist).
          git stash push -u -m "generated outputs" || true
          git pull --rebase origin main || true
          git stash pop || true
          # Stage additions/modifications/deletions under outputs + README.
          git add -A -- txt m3u README.md || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto update rtp sources"
            git push
          fi
